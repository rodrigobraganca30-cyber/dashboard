version: '3.8'
services:
  evolution-api:
    image: atendai/evolution-api:v1.8.2
    container_name: evolution-api
    restart: always
    environment:
    - SERVER_TYPE=http
    - SERVER_PORT=8080
    - CORS_ORIGIN=*
    - AUTHENTICATION_TYPE=apikey
    - AUTHENTICATION_API_KEY=${EVO_API_KEY:-svoboda-evo-secret-key-2025}
    - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
    - WEBHOOK_GLOBAL_ENABLED=true
    - WEBHOOK_GLOBAL_URL=http://backend:3001/webhook
    - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=true
    - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
    - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
    - STORE_MESSAGES=true
    - STORE_MESSAGE_UP=true
    - STORE_CONTACTS=true
    - STORE_CHATS=true
    - LOG_LEVEL=ERROR
    volumes:
    - evolution_instances:/evolution/instances
    - evolution_store:/evolution/store
    labels:
    - traefik.enable=true
    - traefik.http.routers.evolution.rule=Host(`evo.rtflowapp.com`)
    - traefik.http.routers.evolution.entrypoints=websecure
    - traefik.http.routers.evolution.tls.certresolver=letsencrypt
    - traefik.http.services.evolution.loadbalancer.server.port=8080
    depends_on:
    - redis
    networks:
    - agenda-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
  agenda-db:
    image: postgres:16-alpine
    container_name: agenda-db
    restart: always
    environment:
      POSTGRES_USER: agenda_user
      POSTGRES_PASSWORD: svoboda2025
      POSTGRES_DB: agenda
    volumes:
      - agenda_pgdata:/var/lib/postgresql/data
    networks:
      - agenda-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
  redis:
    image: redis:7-alpine
    container_name: redis-agenda
    restart: always
    command: redis-server --appendonly yes --save 60 1000
    volumes:
    - redis_data:/data
    networks:
    - agenda-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 64M
  backend:
    build: ./backend
    container_name: backend-agenda
    restart: always
    environment:
    - PORT=3001
    - EVOLUTION_URL=http://evolution-api:8080
    - EVOLUTION_KEY=${EVO_API_KEY:-svoboda-evo-secret-key-2025}
    - EVOLUTION_INSTANCE=svoboda
    - REDIS_URL=redis://redis:6379
    - DATABASE_URL=postgresql://agenda_user:svoboda2025@agenda-db:5432/agenda
    - AGENDA_API_KEY=${AGENDA_API_KEY:-svoboda-agenda-2025}
    labels:
    - traefik.enable=true
    - traefik.http.routers.agenda.rule=Host(`agenda.rtflowapp.com`)
    - traefik.http.routers.agenda.entrypoints=websecure
    - traefik.http.routers.agenda.tls.certresolver=letsencrypt
    - traefik.http.services.agenda.loadbalancer.server.port=3001
    depends_on:
    - evolution-api
    - redis
    volumes:
    - /docker/whatsapp-agenda/frontend:/frontend:ro
    networks:
    - agenda-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
volumes:
  agenda_pgdata: null
  evolution_instances: null
  evolution_store: null
  redis_data: null
networks:
  agenda-net:
    driver: bridge
